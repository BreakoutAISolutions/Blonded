      align-items: flex-end;
      justify-content: center;
      padding: 12px;

    .sheet {

      overflow: auto;
      background: white;
      border: 2px solid var(--ink);
      border-radius: 25px;
      padding: 16px;
      box-shadow: 0 12px 0 rgba(0,0,0,.2);

      left: 50%;
      bottom: 78px;
      transform: translateX(-50%);

      color: white;
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 900;
      display: none;
      z-index: 99;

    .empty {

      background: white;

</head>

let state = loadState();
let screen = "schedule";
let selectedDay = "Mon";
let activeAppointment = null;
let activeClient = null;

function loadState() {
  const saved = localStorage.getItem(STORAGE_KEY);

  if (saved) {
    return JSON.parse(saved);
  }

  return {
    clients: defaultClients,
    services: defaultServices,
    appointments: defaultAppointments,
    closed: defaultClosed,
    activities: defaultActivities,
    settings: {
      weeklyGoal: 3250,
      defaultTip: 15,
      appleSync: false,
      messagesMode: "Copy first, then open Messages"
    }
  };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function money(n) {
  return "$" + Number(n || 0).toLocaleString();
}

function getClient(id) {
  return state.clients.find(c => Number(c.id) === Number(id));
}

function initials(name) {
  return name
    .split(" ")
    .map(x => x[0])
    .join("")
    .slice(0, 2)
    .toUpperCase();
}

function nextId(items) {
  return Math.max(0, ...items.map(i => Number(i.id) || 0)) + 1;
}

function totalClosed(items) {
  return items.reduce((sum, item) => sum + Number(item.subtotal || 0) + Number(item.tip || 0), 0);
}

function subtotalClosed(items) {
  return items.reduce((sum, item) => sum + Number(item.subtotal || 0), 0);
}

function tipsClosed(items) {
  return items.reduce((sum, item) => sum + Number(item.tip || 0), 0);
}

function formatFlagType(type) {
  const map = {
    alert: "Allergy",
    event: "Occasion",
    formula: "Formula",
    time: "Extra time"
  };

  return map[type] || "Note";
}

function nowLabel() {
  const d = new Date();
  return d.toLocaleString([], {
    weekday: "short",
    hour: "numeric",
    minute: "2-digit"
  });
}

function addActivity(clientId, type, text) {
  state.activities.unshift({
    id: nextId(state.activities),
    clientId: Number(clientId),
    type,
    text,
    createdAt: nowLabel()
  });

  saveState();
}

function clientActivities(clientId) {
  return state.activities.filter(a => Number(a.clientId) === Number(clientId));
}

function showToast(text) {
  const el = document.getElementById("toast");
  el.textContent = text;
  el.classList.add("show");

  setTimeout(() => {
    el.classList.remove("show");
  }, 1300);
}

function setScreen(next) {
  screen = next;
  render();
}

function setNav() {
  ["schedule", "calendar", "people", "tools", "money"].forEach(x => {
    document.getElementById("nav-" + x).classList.toggle("active", screen === x);
  });
}

function render() {
  setNav();

  if (screen === "schedule") {
    renderSchedule();
  }

  if (screen === "calendar") {
    renderCalendar();
  }

  if (screen === "people") {
    renderPeople();
  }

  if (screen === "tools") {
    renderTools();
  }

  if (screen === "money") {
    renderMoney();
  }
}

function renderSchedule() {
  const appts = state.appointments.filter(a => a.day === selectedDay);
  const scheduledTotal = appts
    .filter(a => a.status !== "completed")
    .reduce((sum, a) => sum + Number(a.price || 0), 0);

  const next = appts.find(a => a.status !== "completed") || appts[0];
  const nextClient = next ? getClient(next.clientId) : null;

  document.getElementById("screen").innerHTML = `
    <div class="card pinkCard">
      <div class="row rowTop">
        <div>
          <div class="sub">${selectedDay} July ${dayDates[selectedDay]}</div>
          <h2>${appts.length} appointments</h2>
          <p class="muted">Projected services today: <b>${money(scheduledTotal)}</b></p>
        </div>
        <button class="primary" onclick="openAppleCalendar()">Open Apple Calendar</button>
      </div>
    </div>

    ${nextClient ? `
      <div class="card flat creamCard">
        <div class="sub">Next client</div>
        <div class="row rowTop">

function paymentSplit(items) {
  const map = {};

  items.forEach(i => {
    map[i.payment] = (map[i.payment] || 0) + Number(i.subtotal || 0) + Number(i.tip || 0);
  });

  return Object.keys(map).map(method => {
    return {
      method,
      total: map[method]
    };
  });
}

  const text = document.getElementById("textDraft").value;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      addActivity(clientId, "Text drafted", `${type}: ${text}`);
      showToast("Copied and logged");
    });
  } else {
    document.getElementById("textDraft").select();
    document.execCommand("copy");
    addActivity(clientId, "Text drafted", `${type}: ${text}`);
    showToast("Copied and logged");
  }
}

function finishCloseout() {
  const subtotal = Number(document.getElementById("closeSubtotal").value || activeAppointment.price);
  const tip = Number(document.getElementById("closeTip").value || 0);
  const payment = document.getElementById("closePayment").value;
  const note = document.getElementById("closeNote").value;

  activeAppointment.status = "completed";
  activeAppointment.price = subtotal;

  state.closed.push({
    id: nextId(state.closed),
    period: "today",
    dateLabel: "Today",
    clientId: activeClient.id,
    service: activeAppointment.service,
    subtotal,
    tip,
    payment
  });

  activeClient.spend += subtotal + tip;

  addActivity(activeClient.id, "Closeout", `${activeAppointment.service} closed out for ${money(subtotal + tip)} via ${payment}. Note: ${note}`);

  saveState();
  showToast("Closeout saved");
  closeModal();
  render();
}

        ${activities.length ? activities.slice(0, 6).map(a => activityRow(a)).join("") : `<p class="muted">No activity yet.</p>`}
      </div>
      <div class="card flat">
        <b>Formula history</b>
        ${c.formulaHistory.map(f => `<p class="muted">${f}</p>`).join("")}
      </div>
      <div class="grid2">
        <button onclick="openTextForClient(${c.id})">Text</button>
        <button onclick="openBookingLink(${c.id})">Booking link</button>
        <button onclick="openRebookForClient(${c.id})">Rebook</button>
        <button onclick="openClientMoney(${c.id})">Money</button>
        <button onclick="openFormula(${c.id})">Edit formula</button>
        <button onclick="openAppleCalendar()">Apple Calendar</button>
      </div>
    </div>
  `);
}

function activityRow(a) {
  return `
    <div class="activityItem">
      <span class="activityType">${a.type}</span>
      <p class="muted"><b>${a.createdAt}</b></p>
      <p class="muted">${a.text}</p>
    </div>
  `;
}

function openRebookForClient(clientId) {
  const c = getClient(clientId);
  activeClient = c;
  activeAppointment = { price: 175 };

  const fakeId = state.appointments[0]?.id || 101;

  closeModal();

  setTimeout(() => openRebook(fakeId), 100);
}

function openFormula(clientId) {
  const c = getClient(clientId);

  openModal("Formula for " + c.name, `
    <div class="stack">
      <label>Current formula note
        <textarea id="formulaText">${c.formula}</textarea>
      </label>
      <label>Add history note
        <textarea id="formulaHistoryText">${c.formulaHistory[0] || ""}</textarea>
      </label>
      <button class="primary" onclick="saveFormula(${c.id})">Save formula</button>
    </div>
  `);
}

function saveFormula(clientId) {
  const c = getClient(clientId);

  c.formula = document.getElementById("formulaText").value;

  const newHistory = document.getElementById("formulaHistoryText").value;

  if (newHistory) {
    c.formulaHistory.unshift(newHistory);
  }

  addActivity(clientId, "Formula updated", c.formula);

  saveState();
  showToast("Formula saved");
  closeModal();

  if (screen === "people") {
    renderPeople();
  }
}

function openFlag(apptId) {
  activeAppointment = state.appointments.find(a => Number(a.id) === Number(apptId));

  const c = getClient(activeAppointment.clientId);

  openModal("Flag for " + c.name, `
    <div class="stack">
      <p class="muted">Short flag shows on the schedule. Private note stays inside the appointment.</p>
      <label>Visible flag
        <input id="flagText" value="${activeAppointment.flag || ""}" />
      </label>
      <label>Flag type
        <select id="flagType">
          <option value="alert">Allergy or sensitivity</option>
          <option value="event">Special occasion</option>
          <option value="formula">Formula reminder</option>
          <option value="time">Extra time</option>
          <option value="">Basic note</option>
        </select>
      </label>
      <label>Private appointment note
        <textarea id="privateNote">${activeAppointment.privateNote || ""}</textarea>
      </label>
      <button class="primary" onclick="saveFlag()">Save flag</button>
    </div>
  `);

  document.getElementById("flagType").value = activeAppointment.flagType || "";
}

function saveFlag() {
  activeAppointment.flag = document.getElementById("flagText").value;
  activeAppointment.flagType = document.getElementById("flagType").value;
  activeAppointment.privateNote = document.getElementById("privateNote").value;

  addActivity(activeAppointment.clientId, "Appointment flag updated", `${activeAppointment.flag}: ${activeAppointment.privateNote}`);

  saveState();
  showToast("Flag saved");
  closeModal();
  render();
}

function openMoneyPeriod(title, ids) {
  const items = state.closed.filter(i => ids.includes(i.id));
  const avg = Math.round(totalClosed(items) / Math.max(1, items.length));

  openModal(title + " details", `
    <div class="stack">
      <div class="grid2">
        <div class="card flat pinkCard">
          <div class="sub">Total</div>
          <h2>${money(totalClosed(items))}</h2>
        </div>
        <div class="card flat">
          <div class="sub">Average ticket</div>
          <h2>${money(avg)}</h2>
        </div>
        <div class="card flat">
          <div class="sub">Services</div>
          <h2>${money(subtotalClosed(items))}</h2>
        </div>
        <div class="card flat">
          <div class="sub">Tips</div>
          <h2>${money(tipsClosed(items))}</h2>
        </div>
      </div>
      ${items.map(item => closedRow(item)).join("") || `
        <div class="empty">No closed appointments in this period.</div>
      `}
    </div>
  `);
}

function closedRow(item) {
  const c = getClient(item.clientId);

  return `
    <div class="appt">
      <div class="row rowTop">
        <div>
          <b>${c?.name || "Client"}</b>
          <p class="muted">${item.dateLabel} · ${item.service}</p>
        </div>
        <b>${money(Number(item.subtotal) + Number(item.tip))}</b>
      </div>
      <div class="grid3">
        <div>
          <b>${money(item.subtotal)}</b>
          <p class="muted">Service</p>
        </div>
        <div>
          <b>${money(item.tip)}</b>
          <p class="muted">Tip</p>
        </div>
        <div>
          <b>${item.payment}</b>
          <p class="muted">Payment</p>
        </div>
      </div>
    </div>
  `;
}

function openClientMoney(clientId) {
  const items = state.closed.filter(i => Number(i.clientId) === Number(clientId));

  openMoneyPeriod(getClient(clientId).name, items.map(i => i.id));
}

function openTemplate(type) {
  const c = state.clients[0];

  const templates = {
    confirm: `Hi ${c.name.split(" ")[0]}! Confirming your appointment with Cam tomorrow at 10:00. See you soon 💕`,
    late: `Hi ${c.name.split(" ")[0]}! I’m running about 10 minutes behind. I’ll keep you posted and I’m so sorry for the delay.`,
    rebook: `Hi ${c.name.split(" ")[0]}! I have Mon at 10, Tue at 1:30, or Thu at 3 for your next refresh. Want one of those?`,
    winback: `Hi ${c.name.split(" ")[0]}! You popped into my mind. Want me to send a few openings for your next refresh?`
  };

  const typeLabels = {
    confirm: "Confirmation text",
    late: "Running late text",
    rebook: "Rebook text",
    winback: "Win back text"
  };

  openTextModal(c, templates[type], typeLabels[type]);
}

function openCombo(name, minutes) {
  const c = state.clients[0];
  const msg = `Hi! I have these times open for ${name.toLowerCase()}:\nMon July 14 at 10:00 AM\nTue July 15 at 1:30 PM\nThu July 17 at 3:00 PM`;

  activeClient = c;

  openModal(name, `
    <div class="stack">
      <div class="card flat creamCard">
        <b>Total time needed</b>
        <p class="muted">About ${minutes} minutes with buffer.</p>
      </div>
      <button>Mon July 14 at 10:00 AM</button>
      <button>Tue July 15 at 1:30 PM</button>
      <button>Thu July 17 at 3:00 PM</button>
      <label>Message draft
        <textarea id="textDraft">${msg}</textarea>
      </label>
      <div class="grid2">
        <button class="primary" onclick="copyDraft(${c.id}, 'Combo finder text')">Copy and log</button>
        <button onclick="openMessagesForClient(${c.id})">Open Messages</button>
      </div>
      <button onclick="openBookingLink(${c.id})">Send booking link instead</button>
    </div>
  `);
}

function openServices() {
  openModal("Services and prices", `
    <div class="stack">
      ${state.services.map(s => `
        <div class="appt">
          <div class="row">
            <b>${s.name}</b>
            <b>${money(s.price)}</b>
          </div>
          <p class="muted">${s.category} · ${s.duration} minutes</p>
        </div>
      `).join("")}
    </div>
  `);
}

function openApplePlan() {
  openModal("Apple Calendar plan", `
    <div class="stack">
      <div class="card flat pinkCard">
        <b>Now</b>
        <p class="muted">The prototype keeps a light salon week preview, but the real button is Open Apple Calendar.</p>
      </div>
      <div class="card flat creamCard">
        <b>Production</b>
        <p class="muted">Production should use a native iOS wrapper with Apple EventKit. That allows the app to read busy blocks and create appointments while keeping Apple Calendar central.</p>
      </div>
      <div class="card flat">
        <b>Product rule</b>
        <p class="muted">Do not trap Cam inside the app. Prepare the action, open the native iPhone tool, then log the action back to the client profile.</p>
      </div>
      <button class="primary" onclick="openAppleCalendar()">Open Apple Calendar</button>
    </div>
  `);
}

function openAddAppointment() {
  openModal("Add appointment", `
    <div class="stack">
      <label>Client
        <select id="newApptClient">
          ${state.clients.map(c => `<option value="${c.id}">${c.name}</option>`).join("")}
        </select>
      </label>
      <label>Day
        <select id="newApptDay">
          ${dayOrder.map(d => `<option value="${d}">${d} July ${dayDates[d]}</option>`).join("")}
        </select>
      </label>
      <label>Time
        <input id="newApptTime" value="10:00 AM" />
      </label>
      <label>Service
        <input id="newApptService" value="Base Color + Blowdry" />
      </label>
      <label>Price
        <input id="newApptPrice" type="number" value="225" />
      </label>
      <label>Visible flag
        <input id="newApptFlag" value="" placeholder="Wedding prep, sensitive scalp, extra time" />
      </label>
      <button class="primary" onclick="saveNewAppointment()">Create appointment</button>
    </div>
  `);

  document.getElementById("newApptDay").value = selectedDay;
}

function saveNewAppointment() {
  const clientId = Number(document.getElementById("newApptClient").value);

  state.appointments.push({
    id: nextId(state.appointments),
    clientId,
    day: document.getElementById("newApptDay").value,
    time: document.getElementById("newApptTime").value,
    end: "Later",
    service: document.getElementById("newApptService").value,
    price: Number(document.getElementById("newApptPrice").value || 0),
    status: "scheduled",
    flag: document.getElementById("newApptFlag").value,
    flagType: "event",
    privateNote: "Created in demo."
  });

  addActivity(clientId, "Appointment created", "Created a demo appointment from the app.");

  saveState();
  showToast("Appointment added");
  closeModal();
  render();
}

function openAddClient() {
  openModal("Add client", `
    <div class="stack">
      <label>Name
        <input id="newClientName" value="New Client" />
      </label>
      <label>Phone
        <input id="newClientPhone" value="8185550199" />
      </label>
      <label>Usual service
        <input id="newClientService" value="Base Color" />
      </label>
      <label>Cycle days
        <input id="newClientCycle" type="number" value="35" />
      </label>
      <label>Formula note
        <textarea id="newClientFormula">Formula notes go here.</textarea>
      </label>
      <button class="primary" onclick="saveNewClient()">Create client</button>
    </div>
  `);
}

function saveNewClient() {
  const newClient = {
    id: nextId(state.clients),
    name: document.getElementById("newClientName").value,
    phone: document.getElementById("newClientPhone").value,
    tier: "Core",
    usualService: document.getElementById("newClientService").value,
    cycle: Number(document.getElementById("newClientCycle").value || 35),
    daysSince: 0,
    spend: 0,
    payment: "Venmo",
    formula: document.getElementById("newClientFormula").value,
    formulaHistory: [],
    note: "New client."
  };

  state.clients.push(newClient);
  addActivity(newClient.id, "Client created", "Added in demo app.");

  saveState();
  showToast("Client added");
  closeModal();
  renderPeople();
}

function resetDemo() {
  if (!confirm("Reset demo data on this browser?")) {
    return;
  }

  localStorage.removeItem(STORAGE_KEY);
  state = loadState();

  showToast("Demo reset");
  render();
}

render();
</script>
</body>
</html>
